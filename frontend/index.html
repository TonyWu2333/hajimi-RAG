<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 智能助手 | 现代对话体验</title>
    <!-- TailwindCSS v3 + Font Awesome 6 (免费图标库) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js"></script>
    <!-- 自定义微调样式，覆盖默认圆角和过渡 -->
    <style>
        /* 自定义滚动条 - 现代感 */
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* 平滑出现动画 */
        .fade-in-up {
            animation: fadeUp 0.25s ease-out forwards;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* 打字闪烁光标 */
        .typing-cursor::after {
            content: '▋';
            display: inline-block;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            color: #3b82f6;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        /* 背景微光渐变 (更现代) */
        .bg-radial-glow {
            background: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.03) 0%, rgba(0,0,0,0) 70%);
        }
        /* 消息气泡最大宽度限制 */
        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }
        @media (min-width: 640px) {
            .message-bubble {
                max-width: 75%;
            }
        }
        /* 简单的loading点动画 */
        .dot-pulse {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .dot-pulse span {
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        .dot-pulse span:nth-child(1) { animation-delay: -0.32s; }
        .dot-pulse span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* Markdown渲染样式 */
        .message-bubble h1, .message-bubble h2, .message-bubble h3, .message-bubble h4, .message-bubble h5, .message-bubble h6 {
            margin: 12px 0 8px 0;
            font-weight: 600;
            line-height: 1.3;
        }
        .message-bubble h1 { font-size: 1.5rem; color: #1e293b; }
        .message-bubble h2 { font-size: 1.25rem; color: #1e293b; }
        .message-bubble h3 { font-size: 1.1rem; color: #334155; }
        .message-bubble h4, .message-bubble h5, .message-bubble h6 { font-size: 1rem; color: #475569; }
        
        .message-bubble p {
            margin: 8px 0;
            line-height: 1.6;
        }
        
        .message-bubble ul, .message-bubble ol {
            margin: 12px 0;
            padding-left: 24px;
        }
        
        .message-bubble li {
            margin: 4px 0;
            line-height: 1.5;
        }
        
        .message-bubble a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        
        .message-bubble a:hover {
            text-decoration: underline;
        }
        
        .message-bubble code {
            background-color: #f1f5f9;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            color: #dc2626;
        }
        
        .message-bubble pre {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            line-height: 1.4;
        }
        
        .message-bubble blockquote {
            border-left: 3px solid #3b82f6;
            padding-left: 16px;
            margin: 12px 0;
            color: #64748b;
            font-style: italic;
        }
        
        .message-bubble hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 16px 0;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50/20 to-indigo-50/30 min-h-screen font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-5 md:py-8 h-screen flex flex-col">
        <!-- 头部区域 - 磨砂玻璃质感 -->
        <div class="backdrop-blur-sm bg-white/70 rounded-2xl shadow-sm border border-white/50 px-6 py-4 mb-5 flex justify-between items-center flex-wrap gap-3">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 shadow-md flex items-center justify-center overflow-hidden">
                    <img src="hajimi.jpg" alt="AI助手" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl font-semibold text-slate-800 tracking-tight">哈基米RAG</h1>
                    <p class="text-xs text-slate-500 flex items-center gap-1">
                        <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-sm"></span> 
                        在线 · 随时为您解答
                    </p>
                </div>
            </div>
            <div class="flex gap-2 text-sm text-slate-500 bg-slate-100/80 px-3 py-1.5 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>您的本地AI助手</span>
            </div>
        </div>

        <!-- 聊天消息容器 (动态滚动) -->
        <div id="chatMessages" class="flex-1 overflow-y-auto custom-scroll space-y-5 pb-4 pr-1 scroll-smooth">
            <!-- 欢迎消息默认显示 -->
            <div class="flex items-start gap-2.5 fade-in-up">
                <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-indigo-500 flex-shrink-0 flex items-center justify-center shadow-sm overflow-hidden">
                    <img src="hajimi.jpg" alt="AI助手" class="w-full h-full object-cover">
                </div>
                <div class="bg-white border border-slate-100 shadow-sm rounded-2xl rounded-tl-md px-4 py-2.5 message-bubble">
                    <p class="text-slate-700 text-sm leading-relaxed">✨ 嗨！我是你的AI助手，有什么我可以帮你的吗？无论是技术问题、创意灵感还是日常闲聊，我都乐意倾听～</p>
                </div>
            </div>
        </div>

        <!-- 底部输入区 (现代风格 + 渐入) -->
        <div class="mt-5 bg-white/80 backdrop-blur-md rounded-2xl shadow-lg border border-slate-200/80 p-2 transition-all focus-within:ring-2 focus-within:ring-blue-300/50">
            <div class="flex items-end gap-2">
                <div class="flex-1">
                    <textarea id="userInput" rows="1" placeholder="输入消息..." 
                        class="w-full resize-none bg-transparent border-0 focus:ring-0 focus:outline-none text-slate-700 placeholder:text-slate-400 py-3 px-3 max-h-32 min-h-[48px] text-sm leading-relaxed"
                        style="overflow-y: auto;"></textarea>
                </div>
                <button id="sendBtn" 
                    class="h-10 w-10 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 text-white flex items-center justify-center shadow-md transition-all hover:scale-105 active:scale-95 disabled:opacity-50 disabled:hover:scale-100 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 -translate-x-px">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </div>
            <div class="flex justify-between items-center px-2 pb-1 text-[10px] text-slate-400">
                <span>Enter 发送 · Shift+Enter 换行</span>
                <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span> AI 已连接</span>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const chatContainer = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // API 配置 - 若部署在非本地请替换地址，默认使用当前服务端地址（同源或跨域处理）
        const API_URL = 'http://localhost:5000/api/chat';
        
        // 请求状态锁，防止并发发送
        let isWaitingForResponse = false;
        
        // 自动调整textarea高度
        function autoResizeTextarea() {
            userInput.style.height = 'auto';
            const newHeight = Math.min(userInput.scrollHeight, 128);
            userInput.style.height = newHeight + 'px';
        }
        
        userInput.addEventListener('input', autoResizeTextarea);
        
        // 滚动到底部 (平滑)
        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }
        
        // 添加用户消息到界面
        function addUserMessage(content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex items-start gap-2.5 justify-end fade-in-up';
            messageDiv.innerHTML = `
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl rounded-tr-md px-4 py-2.5 message-bubble shadow-sm">
                    <p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(content)}</p>
                </div>
                <div class="w-8 h-8 rounded-full bg-slate-200 flex-shrink-0 flex items-center justify-center shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#475569" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 添加AI消息 (支持Markdown渲染)
        function addAIMessage(content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex items-start gap-2.5 fade-in-up';
            // 使用marked库渲染Markdown为HTML
            const renderedHtml = marked.parse(content);
            messageDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-r from-indigo-500 to-blue-500 flex-shrink-0 flex items-center justify-center shadow-sm overflow-hidden">
                    <img src="hajimi.jpg" alt="AI助手" class="w-full h-full object-cover">
                </div>
                <div class="bg-white border border-slate-100 shadow-sm rounded-2xl rounded-tl-md px-4 py-2.5 message-bubble">
                    <div class="text-slate-700 text-sm leading-relaxed">${renderedHtml}</div>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 显示正在输入的指示器 (思考中)
        let typingIndicator = null;
        function showTypingIndicator() {
            if (typingIndicator) return;
            const indicatorDiv = document.createElement('div');
            indicatorDiv.id = 'aiTypingIndicator';
            indicatorDiv.className = 'flex items-start gap-2.5 fade-in-up';
            indicatorDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-r from-indigo-500 to-blue-500 flex-shrink-0 flex items-center justify-center shadow-sm overflow-hidden">
                    <img src="hajimi.jpg" alt="AI助手" class="w-full h-full object-cover">
                </div>
                <div class="bg-white/80 border border-slate-200 shadow-sm rounded-2xl rounded-tl-md px-4 py-2.5">
                    <div class="dot-pulse">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(indicatorDiv);
            scrollToBottom();
            typingIndicator = indicatorDiv;
        }
        
        function hideTypingIndicator() {
            if (typingIndicator) {
                typingIndicator.remove();
                typingIndicator = null;
            }
        }
        
        // XSS 防护: 简单转义HTML特殊字符
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // 调用后端API
        async function sendMessageToAI(message) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message }),
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `请求失败 (${response.status})`);
                }
                
                const data = await response.json();
                if (data.reply !== undefined) {
                    return data.reply;
                } else if (data.error) {
                    throw new Error(data.error);
                } else {
                    throw new Error('未知的响应格式');
                }
            } catch (err) {
                console.error('API调用错误:', err);
                throw err;
            }
        }
        
        // 主要发送逻辑
        async function handleSend() {
            if (isWaitingForResponse) return;
            
            let rawMessage = userInput.value.trim();
            if (!rawMessage) return;
            
            // 清空输入框并重置高度
            userInput.value = '';
            autoResizeTextarea();
            // 禁用发送按钮，锁定
            isWaitingForResponse = true;
            sendBtn.disabled = true;
            
            // 显示用户消息
            addUserMessage(rawMessage);
            
            // 显示AI正在输入指示器
            showTypingIndicator();
            
            try {
                const aiReply = await sendMessageToAI(rawMessage);
                // 移除指示器
                hideTypingIndicator();
                // 显示AI回复
                addAIMessage(aiReply);
            } catch (error) {
                hideTypingIndicator();
                // 显示错误消息（优雅提示）
                const errorMsg = error.message || '服务暂时不可用，请稍后再试。';
                addAIMessage(`⚠️ 抱歉，发生错误: ${errorMsg}`);
                console.error('发送失败:', error);
            } finally {
                isWaitingForResponse = false;
                sendBtn.disabled = false;
                // 重新聚焦输入框
                userInput.focus();
            }
        }
        
        // 键盘事件: Enter 发送 (Shift+Enter换行)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isWaitingForResponse && userInput.value.trim()) {
                    handleSend();
                }
            }
        });
        
        sendBtn.addEventListener('click', () => {
            if (!isWaitingForResponse && userInput.value.trim()) {
                handleSend();
            }
        });
        
        // 初始聚焦 & 自动调整高度
        userInput.focus();
        
        // 可选: 检查后端健康状态 (优雅启动)
        async function checkBackendHealth() {
            try {
                // 仅仅做预热，但不强制阻断界面，用户发送时会自然报错
                const testResponse = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'ping' }),
                });
                if (!testResponse.ok) {
                    console.warn('后端服务似乎未就绪，请确保 Flask 服务运行在 5000 端口');
                } else {
                    console.log('后端连接正常');
                }
            } catch (err) {
                console.warn('无法连接到后端服务，请确认服务端已启动 (http://localhost:5000/api/chat)');
            }
        }
        // 延迟检查, 避免干扰
        setTimeout(checkBackendHealth, 500);
    </script>
</body>
</html>
